name: Daily YouTube Shorts Monitor

on:
  schedule:
    # 每天北京时间上午 9 点运行（UTC 1:00）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Check if already sent today
        id: dedup
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          LAST_MSG=$(git log origin/gh-pages -1 --format=%s 2>/dev/null || echo "")
          TODAY=$(date +%Y-%m-%d)
          if echo "$LAST_MSG" | grep -q "Daily report: $TODAY"; then
            echo "skip_feishu=true" >> $GITHUB_OUTPUT
            echo "Today's report already deployed, will skip Feishu notification"
          else
            echo "skip_feishu=false" >> $GITHUB_OUTPUT
          fi

      - name: Run monitoring script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ steps.dedup.outputs.skip_feishu == 'true' && '' || secrets.FEISHU_WEBHOOK_URL }}
          GITHUB_USER: Amanda0537
          GITHUB_REPO: youtube-shorts-monitor
        run: python run.py

      - name: Deploy to GitHub Pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          if [ ! -f reports/index.html ]; then
            echo "No report generated, skipping deploy"
            exit 0
          fi
          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout --orphan gh-pages
          find . -maxdepth 1 ! -name '.git' ! -name 'reports' ! -name '.' -exec rm -rf {} \; 2>/dev/null || true
          git checkout main -- reports/ 2>/dev/null || true
          cp -r reports/* . 2>/dev/null || true
          git add -A
          git commit -m "Daily report: $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push origin gh-pages --force

      - name: Summary
        run: |
          echo "### 📊 Daily Report Generated" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- Report: https://Amanda0537.github.io/youtube-shorts-monitor/" >> $GITHUB_STEP_SUMMARY
